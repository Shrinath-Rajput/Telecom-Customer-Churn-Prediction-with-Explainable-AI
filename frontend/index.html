<!DOCTYPE html>
<html>
<head>
  <title>Churn Prediction</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class=" shri container mt-5">
  <h2 class="h1 text-center mb-4">📊 Telecom Churn Prediction</h2>

  <div class="shri card p-4 bg-secondary" id="head1">

    <input id="tenure" class="form-control mb-2" placeholder="Tenure">

    <input id="MonthlyCharges" class="form-control mb-2" placeholder="Monthly Charges">

    <select id="gender" class="form-control mb-2">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <button onclick="predict()" class="btn btn-warning w-100 mt-2">Predict</button>

    <h3 id="result" class="text-center mt-3"></h3>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
